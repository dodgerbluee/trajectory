<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <!--
      theme-color tints the Android Chrome URL bar and the PWA status bar.
      Matching the page background (`--color-background`) makes the URL bar
      blend with the page so there's no visible colored band at the top.
    -->
    <meta name="theme-color" content="#f5f5f5" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0a0a0a" media="(prefers-color-scheme: dark)" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Trajectory" />
    <meta name="mobile-web-app-capable" content="yes" />
    <link rel="icon" type="image/png" href="/logo/trajectory.png" />
    <!--
      iOS doesn't honor manifest background_color for the home-screen icon;
      the PNG itself must be opaque. apple-touch-icon.png is pre-baked with
      the dark-mode background so the white logo doesn't disappear on a
      light home screen.
    -->
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/apple-touch-icon.png" />
    <title>Trajectory</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
